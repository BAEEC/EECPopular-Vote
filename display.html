<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAND SHINING 2026 — จอแสดงผล</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#04040d; --space:#0a0a20; --nebula:#1b1147;
    --gold:#F2D78B; --gold-2:#E4BC66; --gold-line:rgba(242,215,139,.26);
    --cream:#F4ECD6; --muted:rgba(244,236,214,.6);
    --display:'Cinzel',serif; --body:'Noto Sans Thai',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);color:var(--cream);height:100vh;overflow:hidden;
    background:
      radial-gradient(120% 55% at 50% -6%, rgba(242,215,139,.10), transparent 60%),
      radial-gradient(70% 60% at 8% 20%, rgba(120,78,210,.30), transparent 55%),
      radial-gradient(70% 60% at 94% 30%, rgba(70,52,165,.26), transparent 55%),
      linear-gradient(180deg, var(--space) 0%, var(--nebula) 50%, var(--void) 100%);}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .star{position:absolute;background:#fff;border-radius:50%;opacity:.6;animation:tw 3s ease-in-out infinite}
  .star.g{background:var(--gold);box-shadow:0 0 6px var(--gold)}
  @keyframes tw{0%,100%{opacity:.12;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}

  .wrap{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;padding:2.2vh 2.2vw}
  .head{text-align:center;flex:0 0 auto;position:relative}
  .eyebrow{font-family:var(--display);font-size:1.4vh;letter-spacing:.5vw;color:var(--gold-2);opacity:.85}
  .title{font-family:var(--display);font-weight:800;font-size:5vh;line-height:1;letter-spacing:.3vw;
    background:linear-gradient(100deg,#9c7a26,#F7E6B0 25%,#fffaf0 42%,#F2D78B 60%,#9c7a26);
    background-size:230% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 12px rgba(242,215,139,.4));animation:shine 7s linear infinite}
  @keyframes shine{to{background-position:230% 0}}
  .tagline{font-family:var(--display);font-size:1.6vh;letter-spacing:.35vw;color:var(--gold-2);margin-top:.5vh}

  .qr-corner{position:absolute;top:-.5vh;right:0;display:flex;flex-direction:column;align-items:center;gap:.5vh}
  .qr-corner .qrbox{background:#fff;padding:.7vh;border-radius:1vh;border:.3vh solid var(--gold)}
  .qr-corner .qrbox svg{width:9vh;height:9vh;display:block}
  .qr-corner .lbl{font-size:1.25vh;color:var(--gold);font-weight:700}
  .qr-corner .live{display:inline-flex;align-items:center;gap:.5vh;font-size:1.2vh;color:var(--gold-2)}
  .dot{width:.9vh;height:.9vh;border-radius:50%;background:var(--gold);box-shadow:0 0 1.2vh var(--gold);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(242,215,139,.5)}70%{box-shadow:0 0 0 1.4vh rgba(242,215,139,0)}100%{box-shadow:0 0 0 0 rgba(242,215,139,0)}}

  .main{flex:1;display:flex;gap:2vw;min-height:0;margin-top:1.6vh}

  /* ===== HERO อันดับ 1 ===== */
  .hero{width:31%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8vh;
    border:.2vh solid rgba(242,215,139,.6);border-radius:1.8vh;padding:2vh 1.4vw;
    background:linear-gradient(180deg, rgba(64,48,16,.45), rgba(22,15,40,.72));box-shadow:0 0 5vh rgba(242,215,139,.22)}
  .hero.flash{animation:flash 1.1s ease}
  @keyframes flash{0%{box-shadow:0 0 0 rgba(242,215,139,0);transform:scale(1)}30%{box-shadow:0 0 9vh rgba(242,215,139,.6);transform:scale(1.02)}100%{box-shadow:0 0 5vh rgba(242,215,139,.22);transform:scale(1)}}
  .hero .badge{font-family:var(--display);font-size:1.6vh;letter-spacing:.3vw;color:var(--gold-2)}
  .hero .crown{font-size:3vh;color:var(--gold);text-shadow:0 0 2vh var(--gold);line-height:1}
  .hero .hphoto{height:40vh;width:auto;aspect-ratio:3/4;object-fit:cover;border-radius:1.2vh;border:.3vh solid var(--gold);box-shadow:0 0 4vh rgba(242,215,139,.3)}
  .hero .hcode{font-family:var(--display);font-size:4.6vh;font-weight:800;color:#FCEBB0;line-height:1}
  .hero .hname{font-size:1.8vh;color:var(--muted)}
  .hero .hvote{margin-top:.3vh}
  .hero .hvote .num{font-family:var(--display);font-size:6vh;font-weight:800;color:var(--gold);line-height:1;display:inline-block}
  .hero .hvote small{font-size:1.6vh;color:var(--muted);margin-left:.5vw}
  .hero .hit{font-size:2.6vh;letter-spacing:.2vh;text-align:center;line-height:1.2;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ===== ลิสต์อันดับ 2 เป็นต้นไป ===== */
  .list{flex:1;display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:1vh 1.4vw;min-height:0}
  .row{display:grid;grid-template-columns:auto auto 1fr auto;gap:1vw;align-items:center;
    padding:.9vh 1vw;border-radius:1.1vh;border:1px solid var(--gold-line);
    background:linear-gradient(180deg, rgba(30,22,62,.62), rgba(14,10,34,.62));overflow:hidden}
  .row.r2{border-color:rgba(232,236,242,.4)}.row.r3{border-color:rgba(240,192,137,.4)}
  .rk{font-family:var(--display);font-weight:800;font-size:3.4vh;color:var(--gold);min-width:2.2vw;text-align:center}
  .row.r2 .rk{color:#E8ECF2}.row.r3 .rk{color:#F0C089}
  .ph{height:7.6vh;width:5.7vh;object-fit:cover;border-radius:.7vh;border:1px solid var(--gold-line);background:#1a1330}
  .who{min-width:0}
  .who .nm{font-size:1.35vh;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .who .cd{font-size:2.6vh;font-weight:800;color:var(--cream);line-height:1.05}
  .who .it{font-size:1.8vh;letter-spacing:.15vh;line-height:1.2;margin-top:.2vh;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sc{text-align:right}
  .sc .n{font-family:var(--display);font-size:3.6vh;font-weight:700;color:var(--gold);line-height:1;transition:color .3s}
  .sc .l{font-size:1.1vh;color:var(--muted)}
  .bump{animation:bump .6s ease}
  @keyframes bump{0%{color:#fffaf0;transform:scale(1)}40%{transform:scale(1.18);text-shadow:0 0 2vh var(--gold)}100%{transform:scale(1)}}

  @media (prefers-reduced-motion: reduce){*{animation:none !important}}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="head">
    <div class="eyebrow">&#10022;  YOU ARE THE NEXT  &#10022;</div>
    <div class="title">GRAND SHINING 2026</div>
    <div class="tagline">PIM BUSINESS BEYOND STARS</div>
    <div class="qr-corner">
      <div class="qrbox" id="voteqr"></div>
      <div class="lbl">สแกนเพื่อโหวต</div>
      <div class="live"><span class="dot"></span> อัปเดตสด</div>
    </div>
  </div>
  <div class="main">
    <div class="hero" id="hero">
      <div class="badge">&#9733; อันดับ 1 &#9733;</div>
      <div class="crown">&#9819;</div>
      <img class="hphoto" id="hphoto" alt="อันดับ 1">
      <div class="hcode"></div>
      <div class="hname"></div>
      <div class="hvote"><span class="num">0</span><small>คะแนนโหวต</small></div>
      <div class="hit"></div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<script>
/* ===== ตั้งค่า ===== */
const CONFIG = {
  apiUrl: 'https://script.google.com/macros/s/AKfycbxMmM15OdA-KsPWIBU3L1nrPf21H2ltZ4Jo9sA93U10U19GLg-4cn7kSkTlqL3HTOhZ/exec',
  voteUrl: 'https://baeec.github.io/EECPopular-Vote/',
  refreshMs: 7000,
  itemMeta: {10:{emoji:'⭐'},20:{emoji:'🌙'},30:{emoji:'🚀'},50:{emoji:'☄️'},100:{emoji:'🌌'}},
  amounts:[10,20,30,50,100],
};
/* ผู้เข้าประกวด — ต้องตรงกับ index.html (id และชื่อ) */
const CONTESTANTS = [
  {id:'G1',name:'Ice Sirintra',hue:330},
  {id:'G2',name:'Newyear Narissara',hue:350},
  {id:'G3',name:'Praewa Aitsadaoon',hue:300},
  {id:'G4',name:'Na Nichakan',hue:280},
  {id:'B1',name:'Excel Pathanin',hue:210},
  {id:'B2',name:'Sup Thaweesup',hue:200},
  {id:'B3',name:'Jao Poom phucchit',hue:225},
  {id:'B4',name:'Kongphop Piriyakorn',hue:190},
  {id:'B5',name:'Ryuki Paris',hue:235},
  {id:'B6',name:'Toon Somphon',hue:250},
  {id:'L1',name:'Nice Sunicha',hue:150},
  {id:'L2',name:'PP Peerawat',hue:45},
  {id:'L3',name:'Tatar Siriprapa',hue:120},
];
function avatar(c){
  const h=c.hue||250;
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='120' height='160' viewBox='0 0 120 160'>
    <defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='hsl(${h},65%,55%)'/><stop offset='1' stop-color='hsl(${(h+40)%360},70%,38%)'/></linearGradient></defs>
    <rect width='120' height='160' fill='url(#g)'/><circle cx='60' cy='60' r='27' fill='rgba(255,255,255,.92)'/>
    <path d='M24 152c0-25 16-40 36-40s36 15 36 40z' fill='rgba(255,255,255,.92)'/>
    <text x='60' y='130' font-family='sans-serif' font-size='24' font-weight='800' fill='hsl(${h},60%,30%)' text-anchor='middle'>${c.id}</text></svg>`;
  return 'data:image/svg+xml,'+encodeURIComponent(svg);
}
CONTESTANTS.forEach(c=>c.img=avatar(c));
const CMAP={}; CONTESTANTS.forEach(c=>CMAP[c.id]=c);

function buildStars(){
  const sky=document.getElementById('stars');let h='';
  for(let i=0;i<60;i++){const x=(Math.random()*100).toFixed(2),y=(Math.random()*100).toFixed(2),s=(Math.random()*2+1).toFixed(2),d=(Math.random()*3).toFixed(2),dur=(2+Math.random()*3).toFixed(2);const g=Math.random()<0.25?' g':'';h+=`<span class="star${g}" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;animation-delay:${d}s;animation-duration:${dur}s"></span>`;}
  sky.innerHTML=h;
}
function makeVoteQR(){
  try{const qr=qrcode(0,'M');qr.addData(CONFIG.voteUrl);qr.make();
    const box=document.getElementById('voteqr');box.innerHTML=qr.createSvgTag({cellSize:6,margin:1,scalable:true});
    const svg=box.querySelector('svg');if(svg){svg.removeAttribute('width');svg.removeAttribute('height');}
  }catch(e){}
}
function itemsToEmoji(counts){
  counts=counts||{};const order=CONFIG.amounts.slice().sort((a,b)=>a-b);
  let total=0;order.forEach(a=>total+=(counts[a]||0));
  if(!total)return '';
  const compact=total>16,parts=[];
  order.forEach(a=>{const n=counts[a]||0;if(!n)return;const em=(CONFIG.itemMeta[a]||{}).emoji||'\u2022';parts.push((compact||n>8)?(em+'\u00d7'+n):em.repeat(n));});
  return parts.join(compact?' ':'');
}
function itemsKey(o){return Object.keys(o||{}).sort((a,b)=>a-b).map(k=>k+'x'+o[k]).join(',');}

let listEls={},built=false,lastSig='',lastScores={},lastItems={},heroId=null;

function updateHero(c,v){
  const hero=document.getElementById('hero');
  const ph=document.getElementById('hphoto');
  if(heroId!==c.id){
    heroId=c.id;
    ph.setAttribute('src',c.img);
    hero.querySelector('.hcode').textContent=c.id;
    hero.querySelector('.hname').textContent=c.name;
    hero.classList.remove('flash');void hero.offsetWidth;hero.classList.add('flash');
  } else if(ph.getAttribute('src')!==c.img){ ph.setAttribute('src',c.img); }
  hero.querySelector('.hit').textContent=itemsToEmoji(lastItems[c.id]);
  const nEl=hero.querySelector('.hvote .num');const prev=lastScores[c.id];
  nEl.textContent=v;
  if(prev!==undefined&&v!==prev){nEl.classList.remove('bump');void nEl.offsetWidth;nEl.classList.add('bump');}
}

async function refresh(){
  let data={scores:{},items:{},photos:{}};
  try{const r=await fetch(CONFIG.apiUrl+'?action=leaderboard');const d=await r.json();if(d&&d.ok)data=d;}catch(e){return;}
  lastItems=data.items||{};
  Object.keys(data.photos||{}).forEach(id=>{if(CMAP[id]&&data.photos[id])CMAP[id].img=data.photos[id];});
  const sc={};CONTESTANTS.forEach(c=>sc[c.id]=(data.scores&&data.scores[c.id])||0);
  const ranked=[...CONTESTANTS].sort((a,b)=>sc[b.id]-sc[a.id]);
  const heroC=ranked[0], rest=ranked.slice(1);
  const listEl=document.getElementById('list');

  if(!built){
    listEl.innerHTML='';
    CONTESTANTS.forEach(c=>{
      const d=document.createElement('div');d.className='row';
      d.innerHTML=`<div class="rk"></div><img class="ph" src="${c.img}" alt="${c.id}">
        <div class="who"><div class="nm">${c.name}</div><div class="cd">${c.id}</div><div class="it"></div></div>
        <div class="sc"><div class="n"></div><div class="l">คะแนนโหวต</div></div>`;
      listEl.appendChild(d);listEls[c.id]=d;
    });
    built=true;
  }
  const sig=ranked.map(c=>c.id+':'+sc[c.id]+':'+itemsKey(lastItems[c.id])).join('|');
  if(sig===lastSig)return; lastSig=sig;

  updateHero(heroC, sc[heroC.id]);

  listEl.style.gridTemplateRows='repeat('+Math.max(1,Math.ceil(rest.length/2))+',1fr)';
  if(listEls[heroC.id]) listEls[heroC.id].style.display='none';
  rest.forEach((c,i)=>{
    const el=listEls[c.id];if(!el)return;
    el.style.display='';listEl.appendChild(el);
    const rk=i+2;
    el.className='row'+(rk<=3?' r'+rk:'');
    el.querySelector('.rk').textContent=rk;
    const ph=el.querySelector('.ph');if(ph.getAttribute('src')!==c.img)ph.setAttribute('src',c.img);
    el.querySelector('.it').textContent=itemsToEmoji(lastItems[c.id]);
    const nEl=el.querySelector('.sc .n');const v=sc[c.id];
    if(lastScores[c.id]!==undefined&&v!==lastScores[c.id]){nEl.textContent=v;nEl.classList.remove('bump');void nEl.offsetWidth;nEl.classList.add('bump');}
    else nEl.textContent=v;
  });
  lastScores=sc;
}

buildStars(); makeVoteQR(); refresh();
setInterval(refresh, CONFIG.refreshMs);
</script>
</body>
</html>
